<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英単語学習システム</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding-bottom: 50px; }
        /* 進捗バーのスタイル */
        #progress-container { width: 350px; margin-top: 20px; text-align: center; }
        #bar-bg { width: 100%; height: 12px; background: #ddd; border-radius: 6px; margin-top: 5px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s; }
        
        #card-container { width: 350px; height: 450px; perspective: 1000px; margin-top: 30px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; padding: 25px; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); align-items: center; overflow-y: auto; display: block; }
        
        /* Masteredバッジ */
        #complete-badge { position: absolute; top: 15px; right: 15px; background: #ff9800; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8em; display: none; }
        
        .derived-section { width: 100%; text-align: left; font-size: 0.9em; color: #333; margin-top: 15px; display: none; }
        .btn-group { margin-top: 30px; }
        button { padding: 12px 24px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        #show-derived { background: #6c757d; margin-bottom: 10px; width: 100%; }
        
        label { display: block; margin-top: 20px; background: #e8f5e9; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="progress-container">
        <span id="progress-text" style="font-weight: bold;">0 / 0 単語完了</span>
        <div id="bar-bg"><div id="progress-bar"></div></div>
    </div>

    <div id="card-container">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div id="complete-badge">Mastered!</div>
                <h1 id="word-display" style="font-size: 2.5em; margin-bottom: 10px;">Word</h1>
                <p id="pos-display" style="color: #666;">品詞</p>
                <p style="color: #aaa; font-size: 0.8em; margin-top: 20px;">(クリックしてめくる)</p>
            </div>
            <div class="card-face card-back">
                <h2 style="border-bottom: 2px solid #eee; width: 100%; padding-bottom: 5px;">意味</h2>
                <p id="meanings-display" style="font-size: 1.2em; line-height: 1.5; margin: 20px 0;"></p>
                
                <label>
                    <input type="checkbox" id="mastered-checkbox" onchange="toggleMastered(event)"> 覚えた！
                </label>

                <div style="margin-top: 20px; width: 100%;">
                    <button id="show-derived" onclick="toggleDerived(event)">派生語を表示</button>
                    <div id="derived-display" class="derived-section"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="prevCard()" style="background: #aaa;">前へ</button>
        <button onclick="nextCard()">次へ</button>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
